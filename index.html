    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          if (stored === "dark" || (stored !== "light" && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {}
      })();
    </script>
